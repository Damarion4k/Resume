<!DOCTYPE html>

<head>

  <title>Damarion Williams - Contact Links</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
      width: 100%;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #a3ff00;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
      max-width: 360px;
    }

    .card {
      background: #1a1a1a;
      border: 0.5px solid #333;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: #a3ff00;
    }

    .card p {
      font-size: 12px;
      color: #a3ff00cc;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-row svg,
    .card-row i {
      color: #a3ff00;
      flex-shrink: 0;
    }

    .card-row span {
      font-size: 15px;
      font-weight: 500;
      color: #a3ff00;
    }

    .card-row .arrow {
      margin-left: auto;
      font-size: 16px;
      color: #a3ff0099;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 2rem;
      background: #111;
      border-bottom: 0.5px solid #2a2a2a;
      z-index: 100;
    }

    nav a {
      color: #a3ff00;
      text-decoration: underline;
      text-underline-offset: 4px;
      font-size: 14px;
      font-weight: 400;
      margin-left: 2rem;
      transition: transform 0.15s ease, color 0.15s ease;
      display: inline-block;
    }

    nav a:hover {
      transform: scale(1.12);
      color: #a3ff00;
    }
  </style>
</head>
